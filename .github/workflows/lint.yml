name: Lint & Verify

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install ruff numpy matplotlib requests
      - name: Lint with ruff
        run: ruff check analysis/ --ignore=F401,E501,E722
      - name: Verify scripts are importable
        run: |
          for f in analysis/*.py; do
            python -c "import ast; ast.parse(open('$f').read()); print(f'OK: $f')"
          done
